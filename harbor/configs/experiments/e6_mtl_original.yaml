name: e6_mtl_original
description: 'Sequential: MTL-original approach — 3-level abstraction, no cognitive
  dimensions, no LLM rerank'
tasks_dir: harbor-tasks/swebench-verified
start_index: 0
end_index: 500
num_tasks: 100
random_seed: 42
agent: mini-swe-agent
model: deepseek/deepseek-chat
llm:
  api_key: ''
  base_url: https://api.deepseek.com
  model: deepseek-chat
use_memory: true
pool_dir: memories/sequential-pool-e6
jobs_dir: jobs/sequential/e6_mtl_original
only_passed: true
derive_traditional_memory: true
excluded_dimensions: []
excluded_levels: []
agent_kwargs:
  step_limit: 150
retrieval_config:
  features:
    use_cognitive_rerank: false
    use_llm_synergy: false
    retrieval_source: traditional
  weights:
    alpha_dual_task: 1.0
    alpha_semantic: 1.0
    alpha_cognitive: 0.0
  retrieval:
    top_n_candidates: 20
    top_k: 3
    min_memories: 0
  threshold:
    score_threshold_floor: 0.0
    score_threshold_std: 0.0
