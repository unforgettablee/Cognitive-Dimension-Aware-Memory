name: e4_no_synergy
description: 'Sequential: full retrieval + rerank, but synergy detection disabled'
tasks_dir: harbor-tasks/swebench-verified
start_index: 0
end_index: 500
num_tasks: 100
random_seed: 42
agent: mini-swe-agent
model: deepseek/deepseek-chat
extract_model: deepseek-chat
llm:
  api_key: ''
  base_url: https://api.deepseek.com
use_memory: true
pool_dir: memories/sequential-pool-e4
jobs_dir: jobs/sequential/e4_no_synergy
only_passed: false
derive_traditional_memory: true
excluded_dimensions: []
excluded_levels: []
agent_kwargs:
  step_limit: 150
retrieval_config:
  features:
    use_cognitive_rerank: true
    use_llm_synergy: false
    use_synergy_selection: false
    retrieval_source: cognitive
  weights:
    alpha_dual_task: 0.7
    alpha_semantic: 0.7
    alpha_cognitive: 0.3
  retrieval:
    top_n_candidates: 10
    top_k: 3
    min_memories: 0
  threshold:
    score_threshold_floor: 0.45
    score_threshold_std: 0.5
