name: e16_llm_direct_topk
description: 'Sequential: LLM directly selects top-K from candidates — no 4x4 dimension
  partition'
tasks_dir: harbor-tasks/swebench-verified
start_index: 0
end_index: 500
num_tasks: 100
random_seed: 42
agent: mini-swe-agent
model: deepseek/deepseek-chat
llm:
  api_key: ''
  base_url: https://api.deepseek.com
  model: deepseek-chat
use_memory: true
pool_dir: memories/sequential-pool-e16
jobs_dir: jobs/sequential/e16_llm_direct
only_passed: true
derive_traditional_memory: true
excluded_dimensions: []
excluded_levels: []
use_direct_llm_topk: true
agent_kwargs:
  step_limit: 150
retrieval_config:
  features:
    use_cognitive_rerank: false
    use_llm_synergy: false
    retrieval_source: cognitive
  retrieval:
    top_n_candidates: 20
    top_k: 3
    min_memories: 1
