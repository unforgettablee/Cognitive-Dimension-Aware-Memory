name: e20_claude_opus
description: 'Sequential: full system with Claude Opus 4.5 — model independence validation'
tasks_dir: harbor-tasks/swebench-verified
start_index: 0
end_index: 500
num_tasks: 100
random_seed: 42
agent: mini-swe-agent
model: anthropic/claude-opus-4-5
extract_model: deepseek-chat
llm:
  api_key: ''
  base_url: https://api.anthropic.com
use_memory: true
pool_dir: memories/sequential-pool-e20
jobs_dir: jobs/sequential/e20_claude_opus
only_passed: false
derive_traditional_memory: true
excluded_dimensions: []
excluded_levels: []
agent_kwargs:
  step_limit: 150
retrieval_config:
  features:
    use_cognitive_rerank: true
    use_llm_synergy: true
    use_synergy_selection: true
    retrieval_source: cognitive
  weights:
    alpha_dual_task: 0.7
    alpha_semantic: 0.7
    alpha_cognitive: 0.3
  retrieval:
    top_n_candidates: 10
    top_k: 3
    min_memories: 0
  threshold:
    score_threshold_floor: 0.45
    score_threshold_std: 0.5
