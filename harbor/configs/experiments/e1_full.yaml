name: e1_full_system
description: Full MTL pipeline with all features enabled — sequential execution
tasks_dir: harbor-tasks/swebench-verified
start_index: 0
end_index: 500
num_tasks: null
random_seed: 42
agent: mini-swe-agent
model: deepseek/deepseek-chat
llm:
  api_key: ''
  base_url: https://api.deepseek.com
  model: deepseek-chat
use_memory: true
pool_dir: memories/sequential-pool-e1
jobs_dir: jobs/sequential/e1_full
only_passed: false
derive_traditional_memory: true
agent_kwargs:
  step_limit: 150
retrieval_config:
  features:
    use_cognitive_rerank: true
    use_llm_synergy: true
    retrieval_source: cognitive
  weights:
    alpha_dual_task: 0.7
    alpha_semantic: 0.35
    alpha_cognitive: 0.65
  retrieval:
    top_n_candidates: 20
    top_k: 3
    min_memories: 0
  threshold:
    score_threshold_floor: 0.45
    score_threshold_std: 0.5
